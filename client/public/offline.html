<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VITAM Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020813;
        --panel: rgba(10, 15, 28, 0.86);
        --border: rgba(96, 165, 250, 0.22);
        --text: #f8fafc;
        --muted: #94a3b8;
        --accent: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", system-ui, sans-serif;
        background:
          radial-gradient(circle at top, rgba(37, 99, 235, 0.22), transparent 40%),
          linear-gradient(180deg, #030712 0%, var(--bg) 100%);
        color: var(--text);
      }

      .card {
        width: min(100%, 540px);
        padding: 32px;
        border-radius: 28px;
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: 0 30px 80px rgba(2, 6, 23, 0.55);
        backdrop-filter: blur(18px);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(37, 99, 235, 0.12);
        color: #93c5fd;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 12px;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0 0 14px;
        color: var(--muted);
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 22px;
      }

      button,
      a {
        appearance: none;
        border: 0;
        border-radius: 16px;
        padding: 14px 18px;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      .primary {
        background: var(--accent);
        color: white;
      }

      .secondary {
        background: rgba(148, 163, 184, 0.12);
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">Network Required</div>
      <h1>VITAM is offline</h1>
      <p>The portal could not reach the live server. Secure sign-in, dashboards, and institutional data need an active connection.</p>
      <p>Reconnect to the internet or wait for the network to recover, then reload this page.</p>
      <div class="actions">
        <button class="primary" onclick="window.location.reload()">Retry Connection</button>
        <a class="secondary" href="/">Return To Portal</a>
      </div>
    </main>
  </body>
</html>
