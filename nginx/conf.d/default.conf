server {
    listen 80;
    server_name vitam.college.edu www.vitam.college.edu;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name vitam.college.edu www.vitam.college.edu;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/vitam.college.edu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vitam.college.edu/privkey.pem;

    location / {
        proxy_pass http://vitam-api:5055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSockets support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
