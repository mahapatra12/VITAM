worker_processes auto;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    # Fundamental security obfuscation
    server_tokens off;

    # Basic anti-DDoS Rate Limiting Map
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream node_cluster {
        # PM2 is handling clustering internally, so we just map to the container
        server vitam-backend:4000;
        keepalive 64;
    }

    server {
        listen 80;
        server_name _;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        # Route standard API REST traffic
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://node_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_read_timeout 90s;
        }

        # Handle Socket.io WebSockets explicitly with UPGRADE protocols
        location /socket.io/ {
            proxy_pass http://node_cluster;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        # Deny access to hidden OS/git files immediately at the edge
        location ~ /\. {
            deny all;
        }
    }
}
