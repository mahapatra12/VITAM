version: '3.8'

services:
  # The Advanced Nginx API Gateway Shield
  api-gateway:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - vitam-backend
    networks:
      - vitam-mesh
    restart: unless-stopped

  # Our Primary Node.js Backend Cluster
  vitam-backend:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb-core:27017/vitam
      - PORT=4000
    depends_on:
      mongodb-core:
        condition: service_healthy
    networks:
      - vitam-mesh
    restart: always

  # The Encrypted Database Engine
  mongodb-core:
    image: mongo:6.0
    command: ["--replSet", "rs0", "--bind_ip_all", "--journal"]
    environment:
      MONGO_INITDB_DATABASE: vitam
    healthcheck:
      test: test $$(echo "rs.initiate().ok || rs.status().ok" | mongo -u root -p root --quiet) -eq 1
      interval: 10s
      timeout: 30s
      start_period: 40s
    volumes:
      - vitam-mongo-data:/data/db
    networks:
      - vitam-mesh
    restart: unless-stopped

volumes:
  vitam-mongo-data:

# Secure Virtual Network Bridge (Shields DB from host exposure)
networks:
  vitam-mesh:
    driver: bridge
